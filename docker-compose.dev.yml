services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL:-placeholder}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-placeholder}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET:-placeholder}
      - CORS_ORIGINS=["http://localhost:5173"]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: node:22-slim
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm dev --host"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL:-placeholder}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY:-placeholder}
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
